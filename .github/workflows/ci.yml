name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Black --check
        run: black --check src tests

      - name: mypy
        run: mypy

      - name: Pytest
        run: pytest

      - name: Bandit (SAST)
        run: |
          pip install bandit
          bandit -q -r src

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit --strict || true   # advisory in Phase 0; gate in Phase 6

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: false
          tags: flowstate/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: flowstate/api:ci
          severity: CRITICAL,HIGH
          exit-code: "0"   # advisory in Phase 0; gate in Phase 6
